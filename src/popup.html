<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PromptVault</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #0a0a0f; color: #e6e6f0; font: 13px/1.5 -apple-system, system-ui, sans-serif; width: 380px; max-height: 600px; overflow: hidden; }
header { padding: 12px 14px; border-bottom: 1px solid #1f1f2e; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 14px; background: linear-gradient(135deg, #6c4be0, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header a { font-size: 11px; color: #8a8a9a; text-decoration: none; }
header a:hover { color: #c084fc; }
.search { width: 100%; padding: 8px 12px; background: #12121a; border: 0; border-bottom: 1px solid #1f1f2e; color: #e6e6f0; font-size: 13px; }
.search:focus { outline: none; }
.list { max-height: 460px; overflow-y: auto; }
.prompt { padding: 8px 14px; border-bottom: 1px solid #1f1f2e; cursor: pointer; }
.prompt:hover { background: #12121a; }
.prompt h3 { font-size: 12px; font-weight: 600; }
.prompt .preview { color: #8a8a9a; font-size: 11px; margin-top: 2px; line-height: 1.3; max-height: 2.6em; overflow: hidden; }
.prompt .tags { margin-top: 4px; }
.prompt .tag { font-size: 10px; padding: 1px 6px; background: rgba(108,75,224,.15); color: #c084fc; border-radius: 999px; margin-right: 3px; }
.modal { display: none; position: fixed; inset: 0; background: #0a0a0f; padding: 12px 14px; flex-direction: column; }
.modal.open { display: flex; }
.modal-head { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; border-bottom: 1px solid #1f1f2e; }
.modal-head h2 { font-size: 13px; flex: 1; }
.modal-head button { background: none; border: 0; color: #8a8a9a; font-size: 16px; cursor: pointer; }
.modal-body { flex: 1; overflow-y: auto; padding: 10px 0; }
.modal-body label { display: block; font-size: 10px; color: #8a8a9a; margin-top: 8px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: .04em; }
.modal-body label:first-child { margin-top: 0; }
.modal-body input, .modal-body textarea { width: 100%; padding: 6px 8px; background: #12121a; border: 1px solid #1f1f2e; border-radius: 4px; color: #e6e6f0; font-size: 12px; font-family: ui-monospace, Menlo, monospace; }
.modal-body textarea { min-height: 60px; resize: vertical; }
.modal-body input:focus, .modal-body textarea:focus { outline: none; border-color: #6c4be0; }
.preview-box { background: #12121a; border: 1px solid #1f1f2e; border-radius: 4px; padding: 10px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto; }
.modal-foot { padding-top: 8px; border-top: 1px solid #1f1f2e; display: flex; gap: 8px; }
.btn { padding: 6px 14px; border-radius: 4px; border: 0; font-size: 12px; font-weight: 600; cursor: pointer; flex: 1; }
.btn-primary { background: linear-gradient(135deg, #6c4be0, #9b6cf0); color: white; }
.btn-primary.copied { background: #4ade80; }
.btn-ghost { background: transparent; color: #8a8a9a; border: 1px solid #1f1f2e; }
footer { padding: 8px 14px; border-top: 1px solid #1f1f2e; color: #8a8a9a; font-size: 10px; text-align: center; }
footer a { color: #c084fc; text-decoration: none; }
.empty { padding: 30px 14px; text-align: center; color: #8a8a9a; font-size: 12px; }
</style>
</head>
<body>

<header>
  <h1>PromptVault</h1>
  <a href="https://jiejuefuyou.github.io/prompts.html" target="_blank">web ↗</a>
</header>

<input id="search" class="search" type="search" placeholder="Search 113 prompts…" autofocus>

<div id="list" class="list"></div>

<footer>
  113 prompts · all client-side · <a href="https://github.com/jiejuefuyou/autoapp-prompt-vault" target="_blank">iOS app</a>
</footer>

<div class="modal" id="modal">
  <div class="modal-head">
    <h2 id="modalTitle"></h2>
    <button id="modalClose">×</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
  <div class="modal-foot">
    <button class="btn btn-ghost" id="modalCancel">Back</button>
    <button class="btn btn-primary" id="modalCopy">Copy to clipboard</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
